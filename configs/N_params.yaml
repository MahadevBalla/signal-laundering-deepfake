# Pipeline N - Network / Communication
# Use depending on the environment; set it to the actual mount path
# noise_dir: data/noise/SPIB | /scratch/<your_username>/noise/SPIB
# Leave null if you want the built-in white noise fallback:
noise_dir: null

stages:
  N1:
    codec: libopus
    bitrate:        # bps - VoIP range per Opus spec
      L: 32000
      M: 24000
      H: 12000

  N2:
    frame_ms: 20     # standard VoIP frame size
    plr:             # packet loss rate (fraction)
      L: 0.01
      M: 0.05
      H: 0.10
    lp_cutoff_hz: 3400  # fixed Butterworth LP - narrowband telephony cutoff
    lp_order: 6

  N3:
    snr_db:          # additive noise SNR
      L: 20
      M: 10
      H: 0
